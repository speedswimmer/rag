{% extends "base.html" %}
{% block title %}Chat — RAG System{% endblock %}

{% block content %}
<div class="chat-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Neuer Chat
      </button>
    </div>
    <div class="sidebar-list" id="sidebarList">
      <!-- Populated by chat.js -->
    </div>
  </aside>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Chat area -->
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="message message-system" id="welcomeMsg">
        <div class="message-bubble">
          Wie kann ich dir helfen?
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <form id="chatForm" class="chat-form">
        <div class="chat-input-wrapper">
          <textarea
            id="questionInput"
            class="chat-input"
            placeholder="Deine Frage …"
            rows="3"
            autofocus
          ></textarea>
          <span class="char-counter" id="charCounter">0 / 2000</span>
        </div>
        <button type="submit" class="chat-send-btn" id="sendBtn" title="Senden (Enter)">
          <span class="btn-text">
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </span>
          <span class="btn-spinner hidden" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='chat.js') }}?v={{ range(10000) | random }}"></script>
{% endblock %}
