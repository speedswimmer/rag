<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">
      <span class="nav-brand-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      {{ app_name }}
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Chat</a>
      <a href="/documents" class="nav-link {% if request.path == '/documents' %}active{% endif %}">Dokumente</a>
      <a href="/admin" class="nav-link {% if request.path == '/admin' %}active{% endif %}">Admin</a>
      <a href="/info" class="nav-link {% if request.path == '/info' %}active{% endif %}">Info</a>
    </div>
    <div class="index-status" id="indexStatus" style="display:none" aria-live="polite">
      <span class="index-dot"></span>
      <span class="index-msg" id="indexMsg"></span>
    </div>
  </nav>

  <script>
    (function pollIndexStatus() {
      const el  = document.getElementById('indexStatus');
      const msg = document.getElementById('indexMsg');
      let hideTimer = null;

      async function check() {
        try {
          const data = await fetch('/index/status').then(r => r.json());

          if (data.state === 'idle') {
            el.style.display = 'none';
          } else {
            el.style.display = 'flex';
            el.className = 'index-status index-status-' + data.state;
            msg.textContent = data.message;

            if (data.state === 'done' || data.state === 'error') {
              clearTimeout(hideTimer);
              hideTimer = setTimeout(() => { el.style.display = 'none'; }, 4000);
            }
          }
        } catch {}
        setTimeout(check, 2000);
      }

      check();
    })();
  </script>

  <main class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
